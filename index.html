<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>촬영 콜시트 — 제작</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="appbar no-print">
    <div class="appbar-inner">
      <h1 class="appbar-title">📋 촬영 콜시트 <span class="muted">제작</span></h1>
      <button class="btn btn--sm btn--ghost" id="btnSample">샘플 불러오기</button>
      <button class="btn btn--sm btn--ghost" id="btnClear">새로 작성</button>
      <button class="btn btn--sm" id="btnPreview">👁️ 미리보기</button>
      <button class="btn btn--sm btn--primary" id="btnShare">🔗 링크 만들기 · 공유</button>
    </div>
  </div>

  <main class="page">
    <div class="ed-hint">
      아래 내용을 채우고 <b>[링크 만들기 · 공유]</b>를 누르면, 스태프에게 보낼 수 있는
      보기 전용 링크가 만들어집니다. 입력값은 이 브라우저에 자동 저장됩니다.
    </div>

    <!-- 폼이 여기에 렌더됩니다 -->
    <div id="editor"></div>

    <div class="preview-label no-print">미리보기</div>
    <div id="preview"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/lib/lz-string.min.js"></script>
  <script src="js/lib/html2canvas.min.js"></script>
  <script src="js/lib/jspdf.umd.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/editor.js"></script>
</body>
</html>
