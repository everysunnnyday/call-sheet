<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>촬영 콜시트 — 제작</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="appbar no-print">
    <div class="appbar-inner">
      <h1 class="appbar-title">📋 촬영 콜시트 <span class="muted">제작</span></h1>
      <button class="btn btn--sm btn--ghost" id="btnSample">샘플</button>
      <button class="btn btn--sm btn--ghost" id="btnClear">새로 작성</button>
      <button class="btn btn--sm btn--ghost" id="btnPreview">👁️ 미리보기</button>
      <button class="btn btn--sm btn--primary" id="btnShare">🔗 링크 만들기 · 공유</button>
    </div>
  </div>

  <main class="page">
    <div class="ed-hint">
      고정 정보와 회차(일자)별 내용을 채우고 <b>[링크 만들기·공유]</b>를 누르면 보기 전용 링크가 만들어집니다.
      입력값은 이 브라우저에 자동 저장됩니다. 회차별로 <b>[정보/표 복사·붙여넣기]</b>로 다른 날에 그대로 적용할 수 있습니다.
    </div>
    <div id="editor"></div>
  </main>

  <div class="toast" id="toast"></div>

  <!-- 주소 검색 (Daum 우편번호, 무료) -->
  <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <script src="js/lib/lz-string.min.js"></script>
  <script src="js/lib/html2canvas.min.js"></script>
  <script src="js/lib/jspdf.umd.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/editor.js"></script>
</body>
</html>
