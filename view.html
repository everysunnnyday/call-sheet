<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>촬영 콜시트</title>
  <meta name="description" content="촬영 콜시트">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="appbar no-print">
    <div class="appbar-inner">
      <h1 class="appbar-title">📋 촬영 콜시트 <span class="muted">보기</span></h1>
      <button class="btn btn--sm btn--primary" id="btnPrint">🖨️ 인쇄 (PDF 저장)</button>
    </div>
  </div>

  <main class="page">
    <div id="mount"></div>
  </main>

  <!-- 이미지 팝업 -->
  <div class="cs-lightbox" id="lightbox">
    <button class="cs-lightbox-close" id="lightbox-close" aria-label="닫기">✕</button>
    <img id="lightbox-img" src="" alt="">
  </div>

  <div class="toast" id="toast"></div>

  <!-- Firebase (짧은 링크 · 실시간). 설정 없으면 자동으로 링크 방식으로 폴백 -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/lib/lz-string.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/store.js"></script>
  <script src="js/viewer.js"></script>
</body>
</html>
